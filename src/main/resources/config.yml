modules:
  tag-item:
    enabled: true
    tag-block: FLETCHING_TABLE
    tag-format: "&7#{player}"

  where-my-frame:
    enabled: true
    permission: "cookiepl.command.wmf"
    damagingShears: true
    allowEmptyItemFrame: false

  air-sword:
    enabled: true
    cooldown-ticks: 10

  hat:
    enabled: true
    permission-ignore-binding: "cookiepl.hat.ignore-binding"
    prevent-type-permission-prefix: "cookiepl.hat.prevent-type."
    messages:
      prefix: "&6[Hat] "
      players-only: "&cЭту команду может использовать только игрок."
      hat-fail: "&cУ тебя в руке нет подходящего предмета."
      hat-armor: "&cЭтот предмет нельзя надеть как шляпу."
      hat-curse: "&cНельзя снять предмет с проклятием несъёмности."
      hat-placed: "&aПредмет теперь у тебя на голове."
      hat-empty: "&cНа тебе сейчас нет шляпы."
      hat-removed: "&aШляпа снята."

  fun-commands:
    enabled: true
    permission-fart: "cookiepl.command.fart"
    permission-spit: "cookiepl.command.spit"
    fart:
      enabled: true
      cooldown-seconds: 30
    spit:
      enabled: true
      cooldown-seconds: 5
    messages:
      cooldown: "&cPlease wait before using this command again."
      players-only: "&cThis command can only be used by players."
      no-permission: "&cYou do not have permission to use this command."

  door-knock:
    enabled: true
    text-display:
      enabled: true
      text: "&f* knocks on the door *"
      duration-ticks: 20
    cooldown-seconds: 1

  police-batons:
    enabled: true
    fbi-baton:
      display-name: "&9FBI Baton"
      custom-model-data: 101
      effects:
        darkness:
          amplifier: 2
          duration-seconds: 5
        slowness:
          amplifier: 2
          duration-seconds: 5
      message: "&6Player &e{player} &6was lightly stunned."
    electroshock-baton:
      display-name: "&9FBI Electroshock Baton"
      custom-model-data: 102
      effects:
        darkness:
          amplifier: 10
          duration-seconds: 7
        slowness:
          amplifier: 10
          duration-seconds: 7
      sit-duration-seconds: 7
      message: "&6Player &e{player} &6was heavily stunned."

  player-heads:
    enabled: true
    drop-chance: 100.0
    cooldown-seconds: 3
    bypass-permission: "cookiepl.playerheads.bypass"
    head-name-format: "&f{player}'s Head"
    head-lore-format:
      - "&7Убит: &f{killer}"
      - "&7Время: &f{date}"
    date-format: "dd.MM.yyyy HH:mm:ss"

  hookah:
    enabled: true
    effect-duration-seconds: 3
    overdose-threshold: 8.0
    level-increase: 1.0
    level-decrease-per-second: 0.2
    overdose-level-decrease-per-second: 4.2
    smoke-particle-count: 15

  police-system:
    enabled: true
    permission: "cookiepl.police.use"
    max-cuff-distance: 20.0
    leash-update-interval: 20
    physics:
      min-distance: 2.0
      max-distance: 4.0
      pull-force: 0.3
      prevent-wall-dragging: true
    handcuffs-item:
      material: "LEAD"
      display-name: "&fHandcuffs"
      custom-model-data: 0
    baton-item:
      material: "BLAZE_ROD"
      display-name: "&cPolice Baton"
      custom-model-data: 0
    nock:
      duration-seconds: 10
      message: "&aYou have stunned player {player}!"
      not-stunned-message: "&cTarget player is not stunned."
    cuff:
      message: "&aYou have cuffed player {player}!"
      uncuff-message: "&ePlayer {player} has been released!"
    emote-commands:
      start-cuff: "emotes play 'Руки за спину' {player} true"
      stop-cuff: "emotes stop {player}"

  slap:
    enabled: true
    cooldown-seconds: 3
    pat-chance: 90.0
    show-particles: true
    play-sound: true
    messages:
      action-bar: "&6 <- {player} ->"
      pat-sender: "&6You patted {player} on the shoulder!"
      pat-receiver: "&6{player} patted you on the shoulder!"
      slap-sender: "&6You slapped {player} on the ass!"
      slap-receiver: "&6{player} slapped you on the ass!"

  throwable-stones:
    enabled: true
    stone-item:
      display-name: "&6Stone"
      lore:
        - "&7Press &f&oQ &7to throw"
    throw-power:
      base: 1.0
      sneaking: 0.4
      sprinting: 1.3
      jumping: 1.3
      sprinting-jumping: 1.5
    physics:
      gravity: 0.04
      bounce-modifier: 0.35
      damage-per-block-speed: 1.0
      remove-delay-ticks: 200

  resize:
    enabled: true
    permission: "cookiepl.resize"
    permission-extended: "cookiepl.resize.extended"
    permission-others: "cookiepl.resize.others"
    permission-bypass-cooldown: "cookiepl.resize.bypass.cooldown"
    permission-reload: "cookiepl.resize.reload"
    default-min-scale: 0.8
    default-max-scale: 1.15
    extended-min-scale: 0.0625
    extended-max-scale: 16.0
    cooldown-seconds: 30
    resize-steps: 20
    messages:
      prefix: "&d[&5Resize&d] "
      usage: "&cUsage: /resize <scale> [player]"
      reloaded: "&aPlugin configuration reloaded. Use /cookiepl reload."
      player-not-found: "&cPlayer '{player}' not found."
      invalid-number: "&cInvalid number format."
      scale-range: "&cScale must be between {min} and {max}."
      cooldown: "&cYou must wait {time} seconds before using this command again."
      resized: "&aSuccessfully resized to {scale}."
      resized-other: "&aSuccessfully resized {player} to {scale}."
      players-only: "&cThis command can only be used by players."
      no-permission: "&cYou do not have permission to use this command."

  anti-elytra:
    enabled: true
    mode: "blacklist"
    worlds:
      - "world_the_end"
    bypass-permission: "cookiepl.antielytra.bypass"
    feedback:
      message: "&cElytra flight is disabled in this world."
      sound: "ENTITY_ENDERMAN_TELEPORT"
      particle: "SMOKE_NORMAL"

  afk-system:
    enabled: true
    permission: "cookiepl.command.afk"
    afk-time-seconds: 300
    freeze-player: false
    indicator:
      enabled: true
      text: "&e⌛"
      y-offset: 0.5
    invulnerability:
      enabled: true
    no-hunger:
      enabled: true
    sleep-ignore:
      enabled: true
    placeholder:
      afk-symbol: " &e[AFK]"
    messages:
      afk-enabled: "&7Вы вошли в режим &eAFK&7."
      afk-disabled: "&7Вы вышли из режима &eAFK&7."
      only-player: "&cЭту команду может использовать только игрок."


  profile:
    enabled: true
    permission: "cookiepl.command.profile"

    phantoms:
      max-range: 32.0

    menu:
      categories:
        title: "&8Профиль"

      profile-settings:
        title: "&8Управление профилем"

      common:
        state-enabled: "&aвидно"
        state-disabled: "&7скрыто"
        click-to-enable: "&7Нажми, чтобы показать"
        click-to-disable: "&7Нажми, чтобы скрыть"

      items:
        death:
          name: "&fПоказ смертей"
          description:
            - "&7Включение/выключение показа смертей"

        advancement:
          name: "&fПоказ достижений"
          description:
            - "&7Включение/выключение показа достижений"

        squaremap:
          name: "&fПоказ на карте"
          description:
            - "&7Показ/скрытие игрока на карте squaremap"

        phantoms:
          name: "&fСпавн фантомов"
          description:
            - "&7Включение/выключение спавна фантомов"
          state-enabled: "&aвключено"
          state-disabled: "&cвыключено"
          click-to-enable: "&7Нажми, чтобы включить спавн"
          click-to-disable: "&7Нажми, чтобы выключить спавн"

        back:
          name: "&7Назад"
          description:
            - "&7Вернуться к категориям"

        close:
          name: "&7Закрыть"
          description:
            - "&7Нажми, чтобы выйти"
    messages:
      players-only: "&cЭту команду может использовать только игрок."
      death-enabled: "&7Профиль: &fсмерть видна всем."
      death-disabled: "&7Профиль: &fсмерть скрыта."
      advancements-enabled: "&7Профиль: &fдостижения видны всем."
      advancements-disabled: "&7Профиль: &fдостижения скрыты."
      squaremap-enabled: "&7Профиль: &fотображение на карте включено."
      squaremap-disabled: "&7Профиль: &fотображение на карте скрыто."
      squaremap-unavailable: "&cSquaremap не найден или ещё не загрузился."
      phantoms-enabled: "&7Профиль: &fспавн фантомов включен."
      phantoms-disabled: "&7Профиль: &fспавн фантомов выключен."

  active-player:
    enabled: true
    required-active-seconds: 3600
    role-duration-seconds: 259200
    api-url: "http://212.80.7.211:20081/active"
    request-timeout-seconds: 10
    check-period-ticks: 100
    save-period-ticks: 1200

  web-server:
    enabled: true
    port: 8080
    cors-enabled: true
    season-id: ""
    external-name-url: "http://212.80.7.211:20081/name"
    external-stats-url: "http://212.80.7.211:20081/stats"
    tickets:
      whitelist-url: "http://212.80.7.211:20081/whitelist"
    h2:
      file: "webdb"
      pool-size: 10
    admin-token: "CHANGE_ME"


  antigrief:
    enabled: true
    bypass-permission: "cookiepl.antigrief.bypass"
    required-active-time-seconds: 10800
    idle-timeout-seconds: 300
    save-interval-seconds: 60
    time-zone: "Europe/Moscow"
    time-format: "dd.MM.yyyy HH:mm:ss"
    item-names:
      flint-and-steel: "&6Огниво"
      fire-charge: "&6Огненный шар"
      tnt: "&cДинамит"
      bed: "&cКровать"
      end-crystal: "&dКристалл Края"
      respawn-anchor: "&5Якорь возрождения"
    target-names:
      chest: "сундук"
      trapped-chest: "сундук-ловушка"
      barrel: "бочка"
      shulker-box: "шалкер"
      villager: "крестьянин"
    messages:
      restricted-item: "&cЧтобы использовать {item}, нужно наиграть &f{required}&c активного времени. Но, сейчас у тебя &f{current}&c."
    container-monitor:
      newbie-max-active-time-seconds: 7200
      window-seconds: 300
      open:
        min-unique-targets: 8
        min-spread-blocks: 24.0
        alert-cooldown-seconds: 900
      break:
        min-unique-targets: 5
        min-spread-blocks: 24.0
        alert-cooldown-seconds: 900
    webhook:
      enabled: false
      url: "https://discord.com/api/webhooks/CHANGE_ME"
      username: "CookiePl AntiGrief"
      avatar-url: ""
      mention: ""
      timeout-seconds: 10
      messages:
        open: "{mention}**{player}** за период **{period}** открыл слишком много обьектов в разных местах. Наиграл: **{active_time}**. Обьектов: **{count}**. Миры: **{worlds}**. Разброс: **{spread}** блоков. Детали: **{details}**."
        break: "{mention}**{player}** за период **{period}** сломал слишком много обьектов в разных местах. Наиграл: **{active_time}**. Обьектов: **{count}**. Миры: **{worlds}**. Разброс: **{spread}** блоков. Детали: **{details}**."

logging:
  enabled: true
  log-level: "INFO"